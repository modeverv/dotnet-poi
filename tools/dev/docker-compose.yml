services:
  devbox:
    build:
      context: ../..
      dockerfile: tools/dev/Dockerfile.devbox
    container_name: deepseek-devbox
    working_dir: /workspace
    user: "1000:1000"
    init: true
    stdin_open: true
    tty: true
    environment:
      TZ: Asia/Tokyo
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      DOTNET_CLI_HOME: /tmp/dotnet
      MAVEN_CONFIG: /home/dev/.m2
      NUGET_PACKAGES: /home/dev/.nuget/packages
      CARGO_HOME: /usr/local/cargo
      RUSTUP_HOME: /usr/local/rustup
      JAVA_HOME: /opt/java/openjdk
      MAVEN_HOME: /usr/share/maven
      NPM_CONFIG_PREFIX: /home/dev/.npm-global
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-reasoner}
    volumes:
      - ../..:/workspace
      - devbox-home:/home/dev
      - nuget-packages:/home/dev/.nuget/packages
      - maven-repo:/home/dev/.m2
      - npm-cache:/home/dev/.npm
      - npm-global:/home/dev/.npm-global
      - pip-cache:/home/dev/.cache/pip
      - cargo-home:/usr/local/cargo/registry
      - rustup-home:/usr/local/rustup
      - go-pkg:/go/pkg
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=1g,mode=1777
    networks:
      - sandbox_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - bash
      - -lc
      - |
        set -e
        mkdir -p /home/dev/.deepcode
        if [ ! -f /home/dev/.deepcode/settings.json ]; then
          cat > /home/dev/.deepcode/settings.json <<EOF
        {
          "env": {
            "MODEL": "$${DEEPSEEK_MODEL}",
            "BASE_URL": "$${DEEPSEEK_BASE_URL}",
            "API_KEY": "$${DEEPSEEK_API_KEY}"
          },
          "thinkingEnabled": true
        }
        EOF
        fi
        exec tail -f /dev/null

networks:
  sandbox_net:
    driver: bridge

volumes:
  devbox-home:
  nuget-packages:
  maven-repo:
  npm-cache:
  npm-global:
  pip-cache:
  cargo-home:
  rustup-home:
  go-pkg:
