name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ── Job 1: C# unit tests ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Build solution
        run: dotnet build DotnetPOI.sln --no-incremental -c Debug

      - name: Test — DotnetPoi.SS.Tests (XML parity, PoiXmlWriter)
        run: dotnet test tests/DotnetPoi.SS.Tests/ --no-build -c Debug

      - name: Test — DotnetPoi.XSSF.Tests (xlsx read/write)
        run: dotnet test tests/DotnetPoi.XSSF.Tests/ --no-build -c Debug

      - name: Test — DotnetPoi.XSLF.Tests (pptx read/write)
        run: dotnet test tests/DotnetPoi.XSLF.Tests/ --no-build -c Debug

      - name: Test — DotnetPoi.XWPF.Tests (docx read/write)
        run: dotnet test tests/DotnetPoi.XWPF.Tests/ --no-build -c Debug

  # ── Job 2: Bidirectional Java ↔ .NET interop tests ─────────────────────
  interop:
    name: Interop Tests (Java ↔ .NET)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Build solution
        run: dotnet build DotnetPOI.sln --no-incremental -c Debug

      # ── Direction A: Java (POI) writes → C# (dotnet-poi) reads ──────────
      - name: "[A] Java writes fixtures"
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=WriteForDotnetTest
          -B --no-transfer-progress

      - name: "[A] C# reads Java fixtures"
        run: >
          dotnet test tests/DotnetPoi.Interop.Tests/cs/
          --no-build -c Debug
          --filter "Category=ReadFromPoi"

      # ── Direction B: C# (dotnet-poi) writes → Java (POI) reads ──────────
      - name: "[B] C# writes fixtures"
        run: >
          dotnet test tests/DotnetPoi.Interop.Tests/cs/
          --no-build -c Debug
          --filter "Category=WriteForPoi"

      - name: "[B] Java reads C# fixtures"
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=ReadFromDotnetTest
          -B --no-transfer-progress

      # ── Upload generated fixtures as artifact for inspection ─────────────
      - name: Upload interop fixtures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-fixtures
          path: |
            tests/DotnetPoi.Interop.Tests/fixtures/from-poi/
            tests/DotnetPoi.Interop.Tests/fixtures/from-dotnet-poi/
          retention-days: 7
