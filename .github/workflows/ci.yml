name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ── Job 1: C# unit tests ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # Use actions/cache directly to avoid the "cache folder doesn't exist"
      # error that actions/setup-dotnet's built-in cache emits when the
      # NuGet packages directory hasn't been created yet.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/DotnetPOI.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build solution
        run: dotnet build DotnetPOI.sln --no-incremental -c Debug

      # See agents.md CI strategy: stable (Common/POIFS/Ooxml/Formula) + development (Legacy) + integration (All)
      - name: "Test — DotnetPoi.Common.Tests (shared infrastructure)"
        run: dotnet test tests/DotnetPoi.Common.Tests/ --no-build -c Debug
      - name: "Test — DotnetPoi.POIFS.Tests (OLE2 container)"
        run: dotnet test tests/DotnetPoi.POIFS.Tests/ --no-build -c Debug
      - name: "Test — DotnetPoi.Ooxml.Tests (xlsx, docx, pptx)"
        run: dotnet test tests/DotnetPoi.Ooxml.Tests/ --no-build -c Debug
      - name: "Test — DotnetPoi.Legacy.Tests (xls, doc, ppt)"
        run: dotnet test tests/DotnetPoi.Legacy.Tests/ --no-build -c Debug
      - name: "Test — DotnetPoi.Formula.Tests (formula evaluation)"
        run: dotnet test tests/DotnetPoi.Formula.Tests/ --no-build -c Debug
      - name: "Test — DotnetPoi.All.Tests (meta-package smoke)"
        run: dotnet test tests/DotnetPoi.All.Tests/ --no-build -c Debug

  # ── Job 2: Release hygiene and local NuGet install smoke ───────────────
  release-hygiene:
    name: Release Hygiene
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/DotnetPOI.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Validate package hygiene
        run: tools/release/package-hygiene.sh

      - name: Pack release packages in publish order
        run: |
          rm -rf /tmp/nuget-ci-smoke
          mkdir -p /tmp/nuget-ci-smoke
          dotnet pack src/DotnetPoi.Common/DotnetPoi.Common.csproj -c Release -o /tmp/nuget-ci-smoke
          dotnet pack src/DotnetPoi.POIFS/DotnetPoi.POIFS.csproj -c Release -o /tmp/nuget-ci-smoke
          dotnet pack src/DotnetPoi.Legacy/DotnetPoi.Legacy.csproj -c Release -o /tmp/nuget-ci-smoke
          dotnet pack src/DotnetPoi.Formula/DotnetPoi.Formula.csproj -c Release -o /tmp/nuget-ci-smoke
          dotnet pack src/DotnetPoi.Ooxml/DotnetPoi.Ooxml.csproj -c Release -o /tmp/nuget-ci-smoke
          dotnet pack src/DotnetPoi.All/DotnetPoi.All.csproj -c Release -o /tmp/nuget-ci-smoke

      - name: NuGet install smoke
        run: tools/release/nuget-install-smoke.sh /tmp/nuget-ci-smoke

  # ── Job 3: Bidirectional Java ↔ .NET interop tests ─────────────────────
  interop:
    name: Interop Tests (Java ↔ .NET)
    runs-on: ubuntu-latest
    needs: [unit-tests, release-hygiene]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/DotnetPOI.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build solution
        run: dotnet build DotnetPOI.sln --no-incremental -c Debug

      # ── Direction A: Java (POI) writes → C# (dotnet-poi) reads ──────────
      - name: "[A] Java writes fixtures"
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=WriteForDotnetTest
          -B --no-transfer-progress

      - name: "[A] C# reads Java fixtures"
        run: >
          dotnet test tests/DotnetPoi.Interop.Tests/
          --no-build -c Debug
          --filter "Category=ReadFromPoi"

      # ── Direction B: C# (dotnet-poi) writes → Java (POI) reads ──────────
      - name: "[B] C# writes fixtures"
        run: >
          dotnet test tests/DotnetPoi.Interop.Tests/
          --no-build -c Debug
          --filter "Category=WriteForPoi"

      - name: "[B] Java reads C# fixtures"
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=ReadFromDotnetTest
          -B --no-transfer-progress

      # ── Upload generated fixtures as artifact for inspection ─────────────
      - name: Upload interop fixtures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-fixtures
          path: |
            tests/DotnetPoi.Interop.Tests/fixtures/from-poi/
            tests/DotnetPoi.Interop.Tests/fixtures/from-dotnet-poi/
          retention-days: 7
