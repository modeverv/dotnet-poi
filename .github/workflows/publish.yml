name: Publish

on:
  push:
    tags:
      - "v*"   # e.g. v0.1.0, v1.0.0, v1.2.3-beta1

jobs:
  # ── Job 1: Full test suite ─────────────────────────────────────────
  test:
    name: Test (unit + interop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Java 21 (for interop fixtures)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/DotnetPOI.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build solution (Release)
        run: dotnet build DotnetPOI.sln --no-incremental -c Release

      # ── All test suites ───────────────────────────────────────────────
      - name: "Test — Common.Tests (shared infrastructure)"
        run: dotnet test tests/DotnetPoi.Common.Tests/ --no-build -c Release
      - name: "Test — POIFS.Tests (OLE2 container)"
        run: dotnet test tests/DotnetPoi.POIFS.Tests/ --no-build -c Release
      - name: "Test — Ooxml.Tests (xlsx, docx, pptx)"
        run: dotnet test tests/DotnetPoi.Ooxml.Tests/ --no-build -c Release
      - name: "Test — Legacy.Tests (xls, doc, ppt)"
        run: dotnet test tests/DotnetPoi.Legacy.Tests/ --no-build -c Release
      - name: "Test — Formula.Tests"
        run: dotnet test tests/DotnetPoi.Formula.Tests/ --no-build -c Release
      - name: "Test — All.Tests (meta-package smoke)"
        run: dotnet test tests/DotnetPoi.All.Tests/ --no-build -c Release

      # ── Direction A: Java writes → C# reads ────────────────────────
      - name: "[A] Java writes fixtures"
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=WriteForDotnetTest
          -B --no-transfer-progress

      - name: "[A] C# reads Java fixtures"
        run: >
          dotnet test tests/DotnetPoi.Interop.Tests/
          --no-build -c Release
          --filter "Category=ReadFromPoi"

      # ── Direction B: C# writes → Java reads ────────────────────────
      - name: "[B] C# writes fixtures"
        run: >
          dotnet test tests/DotnetPoi.Interop.Tests/
          --no-build -c Release
          --filter "Category=WriteForPoi"

      - name: "[B] Java reads C# fixtures"
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=ReadFromDotnetTest
          -B --no-transfer-progress

  # ── Job 2: Pack and publish to NuGet + GitHub Release ──────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for release notes / changelog

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Read package versions
        id: packages
        run: |
          TAG="${{ github.ref_name }}"

          OOXML_ID="$(dotnet msbuild src/DotnetPoi.Ooxml/DotnetPoi.Ooxml.csproj -nologo -getProperty:PackageId)"
          OOXML_VERSION="$(dotnet msbuild src/DotnetPoi.Ooxml/DotnetPoi.Ooxml.csproj -nologo -getProperty:PackageVersion)"
          LEGACY_ID="$(dotnet msbuild src/DotnetPoi.Legacy/DotnetPoi.Legacy.csproj -nologo -getProperty:PackageId)"
          LEGACY_VERSION="$(dotnet msbuild src/DotnetPoi.Legacy/DotnetPoi.Legacy.csproj -nologo -getProperty:PackageVersion)"
          FORMULA_ID="$(dotnet msbuild src/DotnetPoi.Formula/DotnetPoi.Formula.csproj -nologo -getProperty:PackageId)"
          FORMULA_VERSION="$(dotnet msbuild src/DotnetPoi.Formula/DotnetPoi.Formula.csproj -nologo -getProperty:PackageVersion)"
          ALL_ID="$(dotnet msbuild src/DotnetPoi.All/DotnetPoi.All.csproj -nologo -getProperty:PackageId)"
          ALL_VERSION="$(dotnet msbuild src/DotnetPoi.All/DotnetPoi.All.csproj -nologo -getProperty:PackageVersion)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ooxml_id=$OOXML_ID" >> "$GITHUB_OUTPUT"
          echo "ooxml_version=$OOXML_VERSION" >> "$GITHUB_OUTPUT"
          echo "legacy_id=$LEGACY_ID" >> "$GITHUB_OUTPUT"
          echo "legacy_version=$LEGACY_VERSION" >> "$GITHUB_OUTPUT"
          echo "formula_id=$FORMULA_ID" >> "$GITHUB_OUTPUT"
          echo "formula_version=$FORMULA_VERSION" >> "$GITHUB_OUTPUT"
          echo "all_id=$ALL_ID" >> "$GITHUB_OUTPUT"
          echo "all_version=$ALL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing NuGet packages
        id: nuget
        run: |
          check_package() {
            local id="$1"
            local version="$2"
            local normalized_id="${id,,}"
            local normalized_version="${version,,}"
            local url="https://api.nuget.org/v3-flatcontainer/${normalized_id}/${normalized_version}/${normalized_id}.${normalized_version}.nupkg"
            local status

            status="$(curl -sSL -o /dev/null -w "%{http_code}" "$url")"
            if [ "$status" = "200" ]; then
              echo "exists"
            elif [ "$status" = "404" ]; then
              echo "missing"
            else
              echo "Unexpected NuGet response for $id $version: HTTP $status" >&2
              exit 1
            fi
          }

          OOXML_STATUS="$(check_package "${{ steps.packages.outputs.ooxml_id }}" "${{ steps.packages.outputs.ooxml_version }}")"
          LEGACY_STATUS="$(check_package "${{ steps.packages.outputs.legacy_id }}" "${{ steps.packages.outputs.legacy_version }}")"
          FORMULA_STATUS="$(check_package "${{ steps.packages.outputs.formula_id }}" "${{ steps.packages.outputs.formula_version }}")"
          ALL_STATUS="$(check_package "${{ steps.packages.outputs.all_id }}" "${{ steps.packages.outputs.all_version }}")"

          echo "ooxml_status=$OOXML_STATUS" >> "$GITHUB_OUTPUT"
          echo "legacy_status=$LEGACY_STATUS" >> "$GITHUB_OUTPUT"
          echo "formula_status=$FORMULA_STATUS" >> "$GITHUB_OUTPUT"
          echo "all_status=$ALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "${{ steps.packages.outputs.ooxml_id }} ${{ steps.packages.outputs.ooxml_version }}: $OOXML_STATUS"
          echo "${{ steps.packages.outputs.legacy_id }} ${{ steps.packages.outputs.legacy_version }}: $LEGACY_STATUS"
          echo "${{ steps.packages.outputs.formula_id }} ${{ steps.packages.outputs.formula_version }}: $FORMULA_STATUS"
          echo "${{ steps.packages.outputs.all_id }} ${{ steps.packages.outputs.all_version }}: $ALL_STATUS"

      - name: Pack NuGet packages
        run: |
          dotnet pack src/DotnetPoi.Ooxml/DotnetPoi.Ooxml.csproj \
            -c Release \
            -o /tmp/nuget-publish

          dotnet pack src/DotnetPoi.Legacy/DotnetPoi.Legacy.csproj \
            -c Release \
            -o /tmp/nuget-publish

          dotnet pack src/DotnetPoi.Formula/DotnetPoi.Formula.csproj \
            -c Release \
            -o /tmp/nuget-publish

          dotnet pack src/DotnetPoi.All/DotnetPoi.All.csproj \
            -c Release \
            -o /tmp/nuget-publish

      - name: Push missing packages to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          push_if_missing() {
            local pkg_id="$1"
            local pkg_version="$2"
            local pkg_status="$3"
            if [ "$pkg_status" = "missing" ]; then
              dotnet nuget push "/tmp/nuget-publish/${pkg_id}.${pkg_version}.nupkg" \
                --api-key "$NUGET_API_KEY" \
                --source https://api.nuget.org/v3/index.json
            else
              echo "Skipping ${pkg_id} ${pkg_version} because it already exists on NuGet.org."
            fi
          }

          push_if_missing "${{ steps.packages.outputs.ooxml_id }}" "${{ steps.packages.outputs.ooxml_version }}" "${{ steps.nuget.outputs.ooxml_status }}"
          push_if_missing "${{ steps.packages.outputs.legacy_id }}" "${{ steps.packages.outputs.legacy_version }}" "${{ steps.nuget.outputs.legacy_status }}"
          push_if_missing "${{ steps.packages.outputs.formula_id }}" "${{ steps.packages.outputs.formula_version }}" "${{ steps.nuget.outputs.formula_status }}"
          push_if_missing "${{ steps.packages.outputs.all_id }}" "${{ steps.packages.outputs.all_version }}" "${{ steps.nuget.outputs.all_status }}"

      - name: Generate release notes
        id: release_notes
        run: |
          cat > /tmp/release-notes.md << 'EOF'
          ## ${{ steps.packages.outputs.tag }}

          See [CHANGELOG / CHECKPOINT](https://github.com/${{ github.repository }}/blob/master/CHECKPOINT.md) for detailed working notes.

          ### NuGet packages
          - `DotnetPoi.Ooxml` — ${{ steps.packages.outputs.ooxml_version }} (${{ steps.nuget.outputs.ooxml_status }})
          - `DotnetPoi.Legacy` — ${{ steps.packages.outputs.legacy_version }} (${{ steps.nuget.outputs.legacy_status }})
          - `DotnetPoi.Formula` — ${{ steps.packages.outputs.formula_version }} (${{ steps.nuget.outputs.formula_status }})
          - `DotnetPoi.All` — ${{ steps.packages.outputs.all_version }} (${{ steps.nuget.outputs.all_status }})

          ### Installation
          ```shell
          dotnet add package DotnetPoi.All --version ${{ steps.packages.outputs.all_version }}
          dotnet add package DotnetPoi.Formula --version ${{ steps.packages.outputs.formula_version }}
          ```

          ### Test results
          - Ooxml: 150+ tests
          - Legacy: 200+ tests
          - Formula: 10+ tests
          - Interop: 55+ tests (bidirectional Java↔.NET)
          EOF

          echo "notes_path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.packages.outputs.tag }}
          name: "${{ steps.packages.outputs.tag }}"
          body_path: ${{ steps.release_notes.outputs.notes_path }}
          files: |
            /tmp/nuget-publish/DotnetPoi.Ooxml.*.nupkg
            /tmp/nuget-publish/DotnetPoi.Ooxml.*.snupkg
            /tmp/nuget-publish/DotnetPoi.Legacy.*.nupkg
            /tmp/nuget-publish/DotnetPoi.Legacy.*.snupkg
            /tmp/nuget-publish/DotnetPoi.Formula.*.nupkg
            /tmp/nuget-publish/DotnetPoi.Formula.*.snupkg
            /tmp/nuget-publish/DotnetPoi.All.*.nupkg
            /tmp/nuget-publish/DotnetPoi.All.*.snupkg
          fail_on_unmatched_files: false
