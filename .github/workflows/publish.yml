name: Publish

on:
  push:
    tags:
      - "v*"   # e.g. v0.1.0, v1.0.0, v1.2.3-beta1

jobs:
  # ── Job 1: Full test suite ─────────────────────────────────────────
  test:
    name: Test (unit + interop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Java 21 (for interop fixtures)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/DotnetPOI.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build solution (Release)
        run: dotnet build DotnetPOI.sln --no-incremental -c Release

      # ── Core + Formula tests ───────────────────────────────────────
      - name: "Test — Core (all formats)"
        run: dotnet test tests/DotnetPoi.Core.Tests/ --no-build -c Release

      - name: "Test — Formula"
        run: dotnet test tests/DotnetPoi.Formula.Tests/ --no-build -c Release

      # ── Direction A: Java writes → C# reads ────────────────────────
      - name: "[A] Java writes fixtures"
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=WriteForDotnetTest
          -B --no-transfer-progress

      - name: "[A] C# reads Java fixtures"
        run: >
          dotnet test tests/DotnetPoi.Interop.Tests/
          --no-build -c Release
          --filter "Category=ReadFromPoi"

      # ── Direction B: C# writes → Java reads ────────────────────────
      - name: "[B] C# writes fixtures"
        run: >
          dotnet test tests/DotnetPoi.Interop.Tests/
          --no-build -c Release
          --filter "Category=WriteForPoi"

      - name: "[B] Java reads C# fixtures"
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=ReadFromDotnetTest
          -B --no-transfer-progress

  # ── Job 2: Pack and publish to NuGet + GitHub Release ──────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for release notes / changelog

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Read package versions
        id: packages
        run: |
          TAG="${{ github.ref_name }}"

          CORE_ID="$(dotnet msbuild src/DotnetPoi.Core/DotnetPoi.Core.csproj -nologo -getProperty:PackageId)"
          CORE_VERSION="$(dotnet msbuild src/DotnetPoi.Core/DotnetPoi.Core.csproj -nologo -getProperty:PackageVersion)"
          FORMULA_ID="$(dotnet msbuild src/DotnetPoi.Formula/DotnetPoi.Formula.csproj -nologo -getProperty:PackageId)"
          FORMULA_VERSION="$(dotnet msbuild src/DotnetPoi.Formula/DotnetPoi.Formula.csproj -nologo -getProperty:PackageVersion)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "core_id=$CORE_ID" >> "$GITHUB_OUTPUT"
          echo "core_version=$CORE_VERSION" >> "$GITHUB_OUTPUT"
          echo "formula_id=$FORMULA_ID" >> "$GITHUB_OUTPUT"
          echo "formula_version=$FORMULA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing NuGet packages
        id: nuget
        run: |
          check_package() {
            local id="$1"
            local version="$2"
            local normalized_id="${id,,}"
            local normalized_version="${version,,}"
            local url="https://api.nuget.org/v3-flatcontainer/${normalized_id}/${normalized_version}/${normalized_id}.${normalized_version}.nupkg"
            local status

            status="$(curl -sSL -o /dev/null -w "%{http_code}" "$url")"
            if [ "$status" = "200" ]; then
              echo "exists"
            elif [ "$status" = "404" ]; then
              echo "missing"
            else
              echo "Unexpected NuGet response for $id $version: HTTP $status" >&2
              exit 1
            fi
          }

          CORE_STATUS="$(check_package "${{ steps.packages.outputs.core_id }}" "${{ steps.packages.outputs.core_version }}")"
          FORMULA_STATUS="$(check_package "${{ steps.packages.outputs.formula_id }}" "${{ steps.packages.outputs.formula_version }}")"

          echo "core_status=$CORE_STATUS" >> "$GITHUB_OUTPUT"
          echo "formula_status=$FORMULA_STATUS" >> "$GITHUB_OUTPUT"
          echo "${{ steps.packages.outputs.core_id }} ${{ steps.packages.outputs.core_version }}: $CORE_STATUS"
          echo "${{ steps.packages.outputs.formula_id }} ${{ steps.packages.outputs.formula_version }}: $FORMULA_STATUS"

      - name: Pack NuGet packages
        run: |
          dotnet pack src/DotnetPoi.Core/DotnetPoi.Core.csproj \
            -c Release \
            -o /tmp/nuget-publish

          dotnet pack src/DotnetPoi.Formula/DotnetPoi.Formula.csproj \
            -c Release \
            -o /tmp/nuget-publish

      - name: Push missing packages to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ "${{ steps.nuget.outputs.core_status }}" = "missing" ]; then
            dotnet nuget push "/tmp/nuget-publish/${{ steps.packages.outputs.core_id }}.${{ steps.packages.outputs.core_version }}.nupkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json
          else
            echo "Skipping ${{ steps.packages.outputs.core_id }} ${{ steps.packages.outputs.core_version }} because it already exists on NuGet.org."
          fi

          if [ "${{ steps.nuget.outputs.formula_status }}" = "missing" ]; then
            dotnet nuget push "/tmp/nuget-publish/${{ steps.packages.outputs.formula_id }}.${{ steps.packages.outputs.formula_version }}.nupkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json
          else
            echo "Skipping ${{ steps.packages.outputs.formula_id }} ${{ steps.packages.outputs.formula_version }} because it already exists on NuGet.org."
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          cat > /tmp/release-notes.md << 'EOF'
          ## ${{ steps.packages.outputs.tag }}

          See [CHANGELOG / CHECKPOINT](https://github.com/${{ github.repository }}/blob/master/CHECKPOINT.md) for detailed working notes.

          ### NuGet packages
          - `DotnetPoi.Core` — ${{ steps.packages.outputs.core_version }} (${{ steps.nuget.outputs.core_status }})
          - `DotnetPoi.Formula` — ${{ steps.packages.outputs.formula_version }} (${{ steps.nuget.outputs.formula_status }})

          ### Installation
          ```shell
          dotnet add package DotnetPoi.Core --version ${{ steps.packages.outputs.core_version }}
          dotnet add package DotnetPoi.Formula --version ${{ steps.packages.outputs.formula_version }}
          ```

          ### Test results
          - Core: 228+ tests
          - Formula: 10 tests
          - Interop: 55+ tests (bidirectional Java↔.NET)
          EOF

          echo "notes_path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.packages.outputs.tag }}
          name: "${{ steps.packages.outputs.tag }}"
          body_path: ${{ steps.release_notes.outputs.notes_path }}
          files: |
            /tmp/nuget-publish/DotnetPoi.Core.*.nupkg
            /tmp/nuget-publish/DotnetPoi.Core.*.snupkg
            /tmp/nuget-publish/DotnetPoi.Formula.*.nupkg
            /tmp/nuget-publish/DotnetPoi.Formula.*.snupkg
          fail_on_unmatched_files: false
