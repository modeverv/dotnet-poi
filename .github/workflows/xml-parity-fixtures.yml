name: XML Parity Fixtures

# Verifies that the XML parity fixtures committed to the repository are still
# up to date with what Apache POI/XMLBeans actually produces.
# Run on every push so drift is caught immediately.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify-fixtures:
    name: Verify XML Parity Fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Regenerate XML parity fixtures
        run: >
          mvn test
          -f tests/DotnetPoi.Interop.Tests/java/pom.xml
          -Dtest=XmlParityFixtureGeneratorTest
          -B --no-transfer-progress

      - name: Assert fixtures are up to date
        # Exclude files that are always volatile:
        #   *__docProps__core.xml  — contains dcterms:created timestamp (changes every run)
        #   _workbooks/*.xlsx      — binary zip; embeds the volatile core.xml
        # All other extracted XML fixtures (worksheet, rels, styles, etc.) must be stable.
        run: |
          git diff --exit-code \
            -- tests/DotnetPoi.Interop.Tests/fixtures/xml-parity \
            ':(exclude)tests/DotnetPoi.Interop.Tests/fixtures/xml-parity/*__docProps__core.xml' \
            ':(exclude)tests/DotnetPoi.Interop.Tests/fixtures/xml-parity/_workbooks'

      - name: Upload regenerated fixtures (on drift)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: updated-xml-parity-fixtures
          path: tests/DotnetPoi.Interop.Tests/fixtures/xml-parity
          retention-days: 7
