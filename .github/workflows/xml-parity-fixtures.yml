name: xml-parity-fixtures

on:
  pull_request:
    paths:
      - "tests/DotnetPoi.Interop.Tests/java/**"
      - "tests/DotnetPoi.Interop.Tests/fixtures/xml-parity/**"
      - ".github/workflows/xml-parity-fixtures.yml"
  push:
    branches: [ "master" ]
    paths:
      - "tests/DotnetPoi.Interop.Tests/java/**"
      - "tests/DotnetPoi.Interop.Tests/fixtures/xml-parity/**"
      - ".github/workflows/xml-parity-fixtures.yml"

jobs:
  generate-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Generate XML parity fixtures
        run: mvn test -f tests/DotnetPoi.Interop.Tests/java/pom.xml -Dtest=XmlParityFixtureGeneratorTest

      - name: Upload generated fixtures
        uses: actions/upload-artifact@v4
        with:
          name: xml-parity-fixtures
          path: tests/DotnetPoi.Interop.Tests/fixtures/xml-parity

      - name: Ensure fixtures are up to date
        run: git diff --exit-code -- tests/DotnetPoi.Interop.Tests/fixtures/xml-parity
